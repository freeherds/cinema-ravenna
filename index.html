<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineClub Ravenna 🍿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .movie-card:hover { border-color: #ef4444; transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans">

    <nav class="p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="resources/cineclub-logo.png" alt="Logo" class="h-12 w-12 rounded-full border-2 border-red-600 object-cover shadow-lg">
                <h1 class="text-2xl font-black text-red-600 tracking-tighter italic">CINECLUB <span class="text-white">RAVENNA</span></h1>
            </div>
            <div>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSc1hATPEqyWaciGKHPg8v7eKPv9UPy_ZhiwxcXs5rC1Ym5pSQ/viewform" target="_blank" class="bg-red-600 text-white px-5 py-2 rounded-full font-bold text-xs hover:bg-red-700 transition uppercase tracking-widest">
                    Vota un Film
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="discussioni" class="mb-16">
            <h2 class="text-3xl font-bold mb-10 text-gray-100 flex items-center gap-3">
                <span class="text-4xl text-red-500">🎬</span> Le nostre Recensioni
            </h2>
            
            <div id="movie-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <p class="text-gray-500 animate-pulse text-center w-full col-span-full">Caricamento proiettore in corso...</p>
            </div>
        </section>

        <section id="archivio" class="pt-10 border-t border-gray-900">
            <h2 class="text-sm font-bold mb-6 text-gray-500 uppercase tracking-[0.2em]">Tutti i titoli in archivio</h2>
            <div id="movie-archive" class="flex flex-wrap gap-2 opacity-60">
                </div>
        </section>

    </main>

    <script>
        const tmdbApiKey = "724dec35d4114dc551e7fc3f7c349910"; 
        const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSDonz2CNaRYpxTJJTqjY5XW4GlxBB0vaenouNdpysCaGH5KOFw1wiXxQkPM4hd7U8g_JIFwDL0C_hc/pub?output=csv"; 
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSc1hATPEqyWaciGKHPg8v7eKPv9UPy_ZhiwxcXs5rC1Ym5pSQ/viewform";

        const tmdbBaseUrl = "https://api.themoviedb.org/3";
        const tmdbImgUrl = "https://image.tmdb.org/t/p/w500";

        async function getTmdb(title) {
            try {
                const res = await fetch(`${tmdbBaseUrl}/search/movie?api_key=${tmdbApiKey}&query=${encodeURIComponent(title)}&language=it-IT`);
                const d = await res.json();
                return d.results?.[0] || null;
            } catch (e) { return null; }
        }

        function init() {
            Papa.parse(googleSheetCSV, {
                download: true, header: true, skipEmptyLines: true,
                complete: async function(results) {
                    const data = results.data;
                    const grid = document.getElementById('movie-grid');
                    const archive = document.getElementById('movie-archive');
                    const moviesMap = {};

                    data.forEach(row => {
                        const titleKey = Object.keys(row).find(k => k.toLowerCase().includes("titolo"));
                        const voteKey = Object.keys(row).find(k => k.toLowerCase().includes("voto"));
                        const nameKey = Object.keys(row).find(k => k.toLowerCase().includes("nome"));
                        const reviewKey = Object.keys(row).find(k => k.toLowerCase().includes("recensione"));

                        const title = row[titleKey]?.trim();
                        if (!title) return;

                        if (!moviesMap[title]) moviesMap[title] = { title, reviews: [], total: 0 };
                        const v = parseFloat(row[voteKey]);
                        if (!isNaN(v)) {
                            moviesMap[title].reviews.push({
                                user: row[nameKey] || "Anonimo",
                                msg: row[reviewKey] || "Nessun testo inserito.",
                                vote: v
                            });
                            moviesMap[title].total += v;
                        }
                    });

                    grid.innerHTML = '';
                    archive.innerHTML = '';
                    const sorted = Object.values(moviesMap).sort((a,b) => (b.total/b.reviews.length) - (a.total/a.reviews.length));

                    for (let m of sorted) {
                        const tmdb = await getTmdb(m.title);
                        const media = (m.total / m.reviews.length).toFixed(1);
                        
                        archive.innerHTML += `<span class="px-2 py-1 bg-gray-900 rounded text-[10px] text-gray-400">${m.title}</span>`;

                        grid.innerHTML += `
                            <div class="movie-card bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 flex flex-col h-[550px] shadow-2xl transition duration-300">
                                <div class="h-56 relative overflow-hidden">
                                    <img src="${tmdb ? tmdbImgUrl + tmdb.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/20 to-transparent"></div>
                                    <div class="absolute bottom-4 left-6 right-6">
                                        <h3 class="text-xl font-black uppercase tracking-tighter leading-tight">${m.title}</h3>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="text-red-500 font-black">★ ${media}</span>
                                            <span class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">${m.reviews.length} SOCI</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="p-6 flex-grow overflow-y-auto custom-scrollbar space-y-4">
                                    ${m.reviews.reverse().map(r => `
                                        <div class="bg-black/30 p-4 rounded-2xl border border-gray-800/40">
                                            <div class="flex justify-between items-center mb-2">
                                                <span class="text-[10px] font-bold text-red-500 uppercase">${r.user}</span>
                                                <span class="text-[10px] text-gray-500">${r.vote}/10</span>
                                            </div>
                                            <p class="text-sm text-gray-300 italic">"${r.msg}"</p>
                                        </div>
                                    `).join('')}
                                </div>

                                <a href="${googleFormUrl}" target="_blank" class="block w-full text-center py-4 bg-gray-800 hover:bg-red-600 text-[10px] font-bold uppercase tracking-[0.2em] transition">
                                    Commenta questo film
                                </a>
                            </div>`;
                    }
                }
            });
        }
        init();
    </script>
</body>
</html>
