<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Ravenna 🍿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

    <nav class="p-6 border-b border-gray-800 bg-gray-900 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-red-500 tracking-tighter">Cinema <span class="text-white">Ravenna</span></h1>
            <div class="flex space-x-6 text-gray-400">
                <a href="#classifica" class="hover:text-white transition">Classifica</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <section id="classifica" class="mb-16">
            <h2 class="text-4xl font-bold mb-10 text-gray-100 tracking-tight">🏆 Classifica dei Più Amati</h2>
            <div id="movie-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <p class="text-gray-500">Caricamento classifica e dati TMDB...</p>
            </div>
        </section>
    </main>

    <script>
        const tmdbApiKey = "724dec35d4114dc551e7fc3f7c349910"; 
        const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSDonz2CNaRYpxTJJTqjY5XW4GlxBB0vaenouNdpysCaGH5KOFw1wiXxQkPM4hd7U8g_JIFwDL0C_hc/pub?output=csv"; 

        const tmdbBaseUrl = "https://api.themoviedb.org/3";
        const tmdbImgUrl = "https://image.tmdb.org/t/p/w500";

        async function getTmdbData(movieTitle) {
            try {
                const response = await fetch(`${tmdbBaseUrl}/search/movie?api_key=${tmdbApiKey}&query=${encodeURIComponent(movieTitle)}&language=it-IT`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    const bestMatch = data.results[0];
                    return {
                        title: bestMatch.title,
                        poster: bestMatch.poster_path ? tmdbImgUrl + bestMatch.poster_path : "https://via.placeholder.com/500x750?text=No+Poster",
                        overview: bestMatch.overview
                    };
                }
            } catch (e) { console.error(e); }
            return null;
        }

        async function loadMoviesAndGrades() {
            if (!tmdbApiKey || tmdbApiKey.length < 10) {
                document.getElementById('movie-grid').innerHTML = '<p class="text-red-500">Errore: API Key non valida.</p>';
                return;
            }

            Papa.parse(googleSheetCSV, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const data = results.data;
                    const grid = document.getElementById('movie-grid');
                    
                    if (!data || data.length === 0) {
                        grid.innerHTML = '<p class="text-yellow-500">Nessun dato trovato nel foglio CSV.</p>';
                        return;
                    }

                    const moviesMap = {};
                    
                    for (let row of data) {
                        // Cerchiamo le colonne ignorando maiuscole/minuscole
                        const titleKey = Object.keys(row).find(k => k.toLowerCase().includes("titolo"));
                        const voteKey = Object.keys(row).find(k => k.toLowerCase().includes("voto"));
                        const nameKey = Object.keys(row).find(k => k.toLowerCase().includes("nome"));
                        const reviewKey = Object.keys(row).find(k => k.toLowerCase().includes("recensione"));

                        const titoloRaw = row[titleKey];
                        if (!titoloRaw) continue;

                        const titolo = titoloRaw.trim();
                        if (!moviesMap[titolo]) {
                            moviesMap[titolo] = { titolo, recensioni: [], sommaVoti: 0, tmdb: null };
                        }

                        const voto = parseFloat(row[voteKey]);
                        if (!isNaN(voto)) {
                            moviesMap[titolo].recensioni.push({
                                nome: row[nameKey] || "Anonimo",
                                testo: row[reviewKey] || "Nessun commento",
                                voto: voto
                            });
                            moviesMap[titolo].sommaVoti += voto;
                        }
                    }

                    const movieTitles = Object.keys(moviesMap);
                    const tmdbResults = await Promise.all(movieTitles.map(t => getTmdbData(t)));
                    movieTitles.forEach((t, i) => moviesMap[t].tmdb = tmdbResults[i]);

                    const sortedMovies = Object.values(moviesMap)
                        .filter(m => m.recensioni.length > 0)
                        .sort((a, b) => (b.sommaVoti/b.recensioni.length) - (a.sommaVoti/a.recensioni.length));

                    grid.innerHTML = '';
                    sortedMovies.forEach(movie => {
                        const media = (movie.sommaVoti / movie.recensioni.length).toFixed(1);
                        const tmdb = movie.tmdb;
                        const poster = tmdb ? tmdb.poster : "https://via.placeholder.com/500x750?text=No+Poster";
                        
                        grid.innerHTML += `
                            <div class="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 shadow-xl">
                                <img src="${poster}" class="w-full h-80 object-cover">
                                <div class="p-6">
                                    <div class="flex justify-between items-start mb-4">
                                        <h3 class="text-xl font-bold">${movie.titolo}</h3>
                                        <span class="bg-red-600 px-3 py-1 rounded-full font-bold">★ ${media}</span>
                                    </div>
                                    <div class="space-y-3">
                                        ${movie.recensioni.map(r => `
                                            <div class="bg-gray-950 p-3 rounded-lg border border-gray-800 text-sm">
                                                <p class="text-red-400 font-bold">${r.nome} <span class="text-gray-500 font-normal">(${r.voto}/10)</span></p>
                                                <p class="text-gray-400 italic">"${r.testo}"</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>`;
                    });
                }
            });
        }
        loadMoviesAndGrades();
    </script>
</body>
</html>
