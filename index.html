<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineClub Ravenna 🍿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        html { scroll-behavior: smooth; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans">

    <nav class="p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="resources/cineclub-logo.jpg" alt="Logo" class="h-12 w-12 rounded-full border-2 border-red-600 object-cover shadow-lg">
                <h1 class="text-2xl font-black text-red-600 tracking-tighter italic hidden sm:block">CINECLUB <span class="text-white">RAVENNA</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <a href="#classifica" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition">Classifica</a>
                <a href="#archivio" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition hidden md:block">Archivio</a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSc1hATPEqyWaciGKHPg8v7eKPv9UPy_ZhiwxcXs5rC1Ym5pSQ/viewform" target="_blank" class="bg-red-600 px-4 py-2 rounded-full font-bold text-[10px] uppercase transition hover:scale-105 shadow-lg shadow-red-900/40">Vota</a>
            </div>
        </div>
    </nav>

    <div id="movie-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="bg-gray-900 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden border border-gray-800 flex flex-col md:flex-row shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-50 bg-black/50 w-10 h-10 rounded-full flex items-center justify-center border border-white/20 hover:bg-red-600 transition">✕</button>
            
            <div id="modal-poster" class="md:w-1/2 h-64 md:h-auto bg-cover bg-center"></div>
            
            <div class="md:w-1/2 p-8 overflow-y-auto custom-scrollbar flex flex-col">
                <h2 id="modal-title" class="text-3xl font-black uppercase mb-2"></h2>
                <div id="modal-rating" class="text-red-500 font-bold mb-4"></div>
                <p id="modal-desc" class="text-gray-400 text-sm italic mb-8 leading-relaxed"></p>
                
                <div class="border-t border-gray-800 pt-6">
                    <h4 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Recensioni dei Soci</h4>
                    <div id="modal-reviews" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6">
        <section id="classifica" class="py-10">
            <h2 class="text-3xl font-bold mb-10 flex items-center gap-3">🏆 Classifica Film</h2>
            <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="archivio" class="py-20 border-t border-gray-900">
            <h2 class="text-gray-500 text-xs font-bold uppercase tracking-[0.3em] mb-6 text-center">Tutti i titoli visti</h2>
            <div id="movie-archive" class="flex flex-wrap justify-center gap-2 opacity-50"></div>
        </section>
    </main>

    <script>
        const tmdbApiKey = "724dec35d4114dc551e7fc3f7c349910"; 
        const googleSheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSDonz2CNaRYpxTJJTqjY5XW4GlxBB0vaenouNdpysCaGH5KOFw1wiXxQkPM4hd7U8g_JIFwDL0C_hc/pub?output=csv"; 
        const tmdbImgUrl = "https://image.tmdb.org/t/p/w500";
        let moviesData = {};

        async function getTmdb(title) {
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${tmdbApiKey}&query=${encodeURIComponent(title)}&language=it-IT`);
            const d = await res.json();
            return d.results?.[0] || null;
        }

        function openModal(title) {
            const m = moviesData[title];
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.tmdb?.overview || "Descrizione non disponibile.";
            document.getElementById('modal-poster').style.backgroundImage = `url(${tmdbImgUrl + m.tmdb?.poster_path})`;
            document.getElementById('modal-rating').innerText = `★ ${(m.total / m.reviews.length).toFixed(1)} / 10`;
            
            const revContainer = document.getElementById('modal-reviews');
            revContainer.innerHTML = m.reviews.map(r => `
                <div class="bg-gray-800/40 p-4 rounded-xl border border-gray-700/50">
                    <div class="flex justify-between text-[10px] mb-1">
                        <span class="font-bold text-red-500 uppercase">${r.user}</span>
                        <span class="text-gray-500 italic">${r.vote}/10</span>
                    </div>
                    <p class="text-sm text-gray-300">"${r.msg}"</p>
                </div>
            `).join('');

            document.getElementById('movie-modal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('movie-modal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        Papa.parse(googleSheetCSV, {
            download: true, header: true, skipEmptyLines: true,
            complete: async function(results) {
                const grid = document.getElementById('movie-grid');
                const archive = document.getElementById('movie-archive');
                
                results.data.forEach(row => {
                    const title = row["Titolo Film"]?.trim();
                    if (!title) return;
                    if (!moviesData[title]) moviesData[title] = { title, reviews: [], total: 0 };
                    const v = parseFloat(row["Voto"]);
                    if (!isNaN(v)) {
                        moviesData[title].reviews.push({ user: row["Il tuo Nome"], msg: row["Recensione"], vote: v });
                        moviesData[title].total += v;
                    }
                });

                const sorted = Object.values(moviesData).sort((a,b) => (b.total/b.reviews.length) - (a.total/a.reviews.length));
                grid.innerHTML = '';

                for (let m of sorted) {
                    m.tmdb = await getTmdb(m.title);
                    const media = (m.total / m.reviews.length).toFixed(1);
                    
                    grid.innerHTML += `
                        <div onclick="openModal('${m.title.replace(/'/g, "\\'")}')" class="group cursor-pointer">
                            <div class="relative aspect-[2/3] rounded-2xl overflow-hidden border border-gray-800 transition duration-300 group-hover:border-red-500 group-hover:-translate-y-2 shadow-xl">
                                <img src="${m.tmdb ? tmdbImgUrl + m.tmdb.poster_path : ''}" class="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition">
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                                <div class="absolute bottom-3 left-4 right-4">
                                    <h3 class="text-sm font-bold uppercase truncate">${m.title}</h3>
                                    <span class="text-red-500 text-xs font-black">★ ${media}</span>
                                </div>
                            </div>
                        </div>`;
                    
                    archive.innerHTML += `<span class="px-2 py-1 bg-gray-900 border border-gray-800 rounded text-[10px] text-gray-600">${m.title}</span>`;
                }
            }
        });
    </script>
</body>
</html>
